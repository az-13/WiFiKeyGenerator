workflows:
  ios-unsigned-build:
    name: Build WiFi Generator (Unsigned IPA)
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Compile iOS App
        script: |
          # Use xcodebuild to build the app without code signing
          xcodebuild build \
            -project "WiFiKeyGenerator.xcodeproj" \
            -scheme "WiFiKeyGenerator" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "build_output" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package into IPA file
        script: |
          # Create the IPA structure and zip it
          mkdir -p Payload
          # The compiled app is inside the Release-iphoneos directory
          cp -r build_output/Build/Products/Release-iphoneos/WiFiKeyGenerator.app Payload/
          zip -qr WiFiKeyGenerator.ipa Payload
    artifacts:
      - WiFiKeyGenerator.ipa
