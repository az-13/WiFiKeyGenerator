workflows:
  ios-unsigned-build:
    name: Build WiFi Generator (iOS 18 Unsigned IPA)
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Install Tools
        script: |
          brew install xcodegen
      - name: Unzip Source Code
        script: |
          unzip -q WiFiKeyGenerator_Xcode_Project.zip
          mv WiFiKeyGenerator_Xcode_Project/WiFiKeyGenerator . || true
      - name: Setup Custom App Icon
        script: |
          # Create the iOS icon folder structure
          mkdir -p WiFiKeyGenerator/Assets.xcassets/AppIcon.appiconset
          
          # Tell Xcode to use this single image for all icon sizes
          cat << 'EOF' > WiFiKeyGenerator/Assets.xcassets/AppIcon.appiconset/Contents.json
          {
            "images" : [
              {
                "filename" : "icon.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : { "author" : "xcode", "version" : 1 }
          }
          EOF
          
          # Copy your uploaded icon.png into the app
          if [ -f "icon.png" ]; then
            cp icon.png WiFiKeyGenerator/Assets.xcassets/AppIcon.appiconset/icon.png
            echo "Custom icon applied successfully!"
          else
            echo "Warning: icon.png not found. Make sure it is named exactly icon.png."
          fi
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Compile iOS App
        script: |
          xcodebuild build \
            -project "WiFiKeyGenerator.xcodeproj" \
            -scheme "WiFiKeyGenerator" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "build_output" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package into IPA file
        script: |
          mkdir -p Payload
          cp -r build_output/Build/Products/Release-iphoneos/WiFiKeyGenerator.app Payload/
          zip -qr WiFiKeyGenerator.ipa Payload
    artifacts:
      - WiFiKeyGenerator.ipa
